<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Application Sankey Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #faf9f6;
    color: #2C2C2A;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #D3D1C7; }
  }
  #sankey { width: 100%; max-width: 960px; }
</style>
</head>
<body>
<div id="sankey"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3-sankey/0.12.3/d3-sankey.min.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;

const data = [
  {company:'阿里', status:'📨 Applied', count:4},
  {company:'阿里', status:'❌ Rejected', count:5},
  {company:'阿里', status:'OA', count:4},
  {company:'百度', status:'📨 Applied', count:4},
  {company:'百度', status:'📞 Interview', count:1},
  {company:'百度', status:'🔍 To Apply', count:5},
  {company:'小米', status:'📨 Applied', count:3},
  {company:'小米', status:'🔍 To Apply', count:2},
  {company:'美团', status:'📨 Applied', count:4},
  {company:'华为', status:'📨 Applied', count:3},
  {company:'华为', status:'🔍 To Apply', count:2},
  {company:'腾讯', status:'📞 Interview', count:1},
  {company:'字节', status:'📞 Interview', count:1},
  {company:'Bytedance', status:'📨 Applied', count:1},
  {company:'IBM', status:'❌ Rejected', count:3},
  {company:'Tesla', status:'📨 Applied', count:1},
  {company:'Amazon', status:'📨 Applied', count:1},
  {company:'Amazon', status:'OA', count:1},
  {company:'Rednote', status:'📨 Applied', count:4},
  {company:'DoorDash', status:'📨 Applied', count:1},
  {company:'Apple', status:'📨 Applied', count:2},
  {company:'OpenAI', status:'📨 Applied', count:1},
  {company:'OpenAI', status:'❌ Rejected', count:1},
  {company:'Lenovo', status:'📨 Applied', count:1},
  {company:'Netflix', status:'📨 Applied', count:1},
  {company:'Snyk', status:'📨 Applied', count:1},
  {company:'Cadence', status:'📨 Applied', count:1},
  {company:'Tinder', status:'📨 Applied', count:1},
  {company:'Stealth Startup', status:'📨 Applied', count:1},
  {company:'Volvox', status:'📨 Applied', count:2},
  {company:'中金', status:'📨 Applied', count:1},
  {company:'中信建设证券', status:'📨 Applied', count:1},
  {company:'OCBridge', status:'❌ Rejected', count:1},
];

const statusOrder = ['🔍 To Apply','📨 Applied','OA','📞 Interview','❌ Rejected'];
const statusColors = {
  '🔍 To Apply': {l:'#D3D1C7', d:'#444441'},
  '📨 Applied': {l:'#85B7EB', d:'#185FA5'},
  'OA': {l:'#FAC775', d:'#854F0B'},
  '📞 Interview': {l:'#AFA9EC', d:'#534AB7'},
  '🎉 Offer': {l:'#97C459', d:'#3B6D11'},
  '❌ Rejected': {l:'#F09595', d:'#A32D2D'},
  '⏸️ Withdrawn': {l:'#B4B2A9', d:'#5F5E5A'},
};

const companySet = [...new Set(data.map(d=>d.company))];
const statusSet = statusOrder.filter(s => data.some(d=>d.status===s));

const nodeNames = [...companySet, ...statusSet];
const nodes = nodeNames.map(n => ({name: n}));
const links = data.map(d => ({
  source: nodeNames.indexOf(d.company),
  target: nodeNames.indexOf(d.status),
  value: d.count
}));

const totalApps = data.reduce((s,d)=>s+d.count, 0);

const W = 900, H = 620;
const svg = d3.select('#sankey').append('svg')
  .attr('viewBox', `0 0 ${W} ${H}`)
  .attr('width', '100%')
  .attr('font-family', '-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif');

const sankey = d3.sankey()
  .nodeId(d => d.index)
  .nodeWidth(14)
  .nodePadding(6)
  .nodeAlign(d3.sankeyLeft)
  .extent([[150, 16], [W - 180, H - 16]]);

const graph = sankey({nodes: nodes.map(d=>({...d})), links: links.map(d=>({...d}))});

const linkG = svg.append('g').attr('fill','none');
linkG.selectAll('path')
  .data(graph.links)
  .join('path')
  .attr('d', d3.sankeyLinkHorizontal())
  .attr('stroke', d => {
    const c = statusColors[graph.nodes[d.target.index].name];
    return c ? (isDark ? c.d : c.l) : (isDark ? '#444' : '#ccc');
  })
  .attr('stroke-opacity', isDark ? 0.5 : 0.45)
  .attr('stroke-width', d => Math.max(1, d.width));

const nodeG = svg.append('g');
nodeG.selectAll('rect')
  .data(graph.nodes)
  .join('rect')
  .attr('x', d => d.x0)
  .attr('y', d => d.y0)
  .attr('height', d => Math.max(1, d.y1 - d.y0))
  .attr('width', d => d.x1 - d.x0)
  .attr('rx', 2)
  .attr('fill', d => {
    const c = statusColors[d.name];
    if(c) return isDark ? c.d : c.l;
    return isDark ? '#5F5E5A' : '#888780';
  });

nodeG.selectAll('text')
  .data(graph.nodes)
  .join('text')
  .attr('x', d => {
    const isCompany = !statusSet.includes(d.name);
    if (isCompany) return d.x0 - 8;
    return d.x1 + 8;
  })
  .attr('y', d => (d.y0 + d.y1) / 2)
  .attr('dy', '0.35em')
  .attr('text-anchor', d => {
    const isCompany = !statusSet.includes(d.name);
    return isCompany ? 'end' : 'start';
  })
  .attr('font-size', d => statusSet.includes(d.name) ? '14px' : '13px')
  .attr('font-weight', d => statusSet.includes(d.name) ? 500 : 400)
  .attr('fill', isDark ? '#D3D1C7' : '#444441')
  .text(d => {
    const val = d.value;
    return statusSet.includes(d.name) ? `${d.name}  (${val})` : d.name;
  });

const summaryData = statusSet.map(s => ({
  label: s,
  count: data.filter(d=>d.status===s).reduce((a,b)=>a+b.count, 0),
  color: statusColors[s]
}));

const legend = svg.append('g').attr('transform', `translate(${W - 170}, 20)`);
legend.append('text')
  .attr('font-size','15px').attr('font-weight',500)
  .attr('fill', isDark ? '#D3D1C7' : '#2C2C2A')
  .text(`${totalApps} applications total`);

summaryData.forEach((d, i) => {
  const g = legend.append('g').attr('transform', `translate(0, ${30 + i * 24})`);
  g.append('rect').attr('width',12).attr('height',12).attr('rx',2)
    .attr('fill', isDark ? d.color.d : d.color.l);
  g.append('text').attr('x',18).attr('y',10).attr('font-size','13px')
    .attr('fill', isDark ? '#B4B2A9' : '#5F5E5A')
    .text(`${d.label}  ${d.count}`);
});
</script>
</body>
</html>
