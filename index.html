<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Journey Sankey</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fff; color: #333;
  display: flex; justify-content: center; padding: .5rem 0;
}
@media (prefers-color-scheme: dark) { body { background: #1a1a1a; color: #D3D1C7; } }
#chart { width: 100%; }
svg { display: block; }
.tp {
  position: fixed; pointer-events: none; z-index: 10;
  padding: 7px 11px; border-radius: 7px;
  font-size: 12px; line-height: 1.4; max-width: 260px; display: none;
  background: rgba(0,0,0,0.82); color: #fff;
}
@media (prefers-color-scheme: dark) { .tp { background: rgba(255,255,255,0.92); color: #1a1a1a; } }
</style>
</head>
<body>
<div id="chart"></div>
<div class="tp" id="tp"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const dk = matchMedia('(prefers-color-scheme:dark)').matches;
const tp = document.getElementById('tp');
const C = {
  New:dk?'#2CB88A':'#5DCAA5', Applied:dk?'#4A9AD9':'#7DBCE8',
  OA:dk?'#D9A030':'#F2C96B', Interview:dk?'#8B7BD4':'#B0A6E8',
  Rejected:dk?'#D06060':'#EE9090'
};
const steps=['4/2','4/3','4/4–5','4/7–8','4/10–12'];
const sO=['New','Applied','OA','Interview','Rejected'];

// [label, weight, s0..s4]
const R=[
['Tesla',1,'New','Applied','Applied','Applied','Applied'],
['IBM',3,'New','Rejected',null,null,null],
['字节',1,'New','Applied','Applied','Applied','Interview'],
['Bytedance',1,'New','Applied','Applied','Applied','Applied'],
['Stealth',1,'New','Applied','Applied','Applied','Applied'],
['百度',2,null,'New','Applied','Applied','Applied'],
['小米',3,null,'New','Applied','Applied','Applied'],
['美团',4,null,'New','Applied','Applied','Applied'],
['华为',2,null,'New','Applied','Applied','Applied'],
['腾讯',1,null,'New','Applied','Applied','Interview'],
['阿里',1,null,'New','Applied','OA','OA'],
['阿里',2,null,'New','Rejected',null,null],
['阿里',1,null,'New','Applied','Rejected',null],
['阿里',2,null,'New','Applied','Applied','Applied'],
['中金',1,null,'New','Applied','Applied','Applied'],
['Amazon',1,null,'New','Applied','Applied','OA'],
['OpenAI',1,null,null,'New','Applied','Applied'],
['OpenAI',1,null,null,'New','Rejected',null],
['阿里',3,null,null,'New','Rejected',null],
['Lenovo',1,null,null,null,'New','Applied'],
['Snyk',1,null,null,null,'New','Applied'],
['Cadence',1,null,null,null,'New','Applied'],
['Tinder',1,null,null,null,'New','Applied'],
['Netflix',1,null,null,null,'New','Applied'],
['Amazon',1,null,null,null,'New','Applied'],
['Apple',2,null,null,null,'New','Applied'],
['DoorDash',1,null,null,null,'New','Applied'],
['华为',1,null,null,null,'New','Applied'],
['阿里',1,null,null,null,'New','Applied'],
['阿里',3,null,null,null,'New','OA'],
['Rednote',4,null,null,null,null,'New'],
['Volvox',2,null,null,null,null,'New'],
['中信建设',1,null,null,null,null,'New'],
['百度',1,null,null,null,null,'Interview'],
['OCBridge',1,null,null,null,null,'Rejected'],
];

const N=5, bW=10;
const cT=[];
for(let i=0;i<N;i++) cT.push(R.reduce((s,r)=>r[i+2]?s+r[1]:s,0));
const mT=Math.max(...cT);

const W=2200, H=520;
const mg={t:44,b:14,l:100,r:120};
const aH=H-mg.t-mg.b;
const cG=(W-mg.l-mg.r-bW*N)/(N-1);
const uH=aH/mT, nP=4;

const NP={}, segs=[];
for(let si=0;si<N;si++){
  const x0=mg.l+si*(bW+cG), cH=cT[si]*uH, sY=mg.t+(aH-cH)/2;
  const gr=[];
  sO.forEach(st=>{
    const m=R.filter(r=>r[si+2]===st);
    if(!m.length)return;
    const c=m.reduce((s,r)=>s+r[1],0);
    gr.push({st,c,rows:m});
  });
  const tP=(gr.length-1)*nP, sc=(cH-tP)/cT[si];
  let y=sY;
  gr.forEach(g=>{
    const h=g.c*sc;
    NP[`${si}|${g.st}`]={x0,x1:x0+bW,y0:y,y1:y+h,si,st:g.st,cnt:g.c};
    let sy=y;
    g.rows.forEach(r=>{
      const sh=r[1]*sc;
      segs.push({si,st:g.st,lab:r[0],w:r[1],y0:sy,y1:sy+sh,x0,x1:x0+bW});
      sy+=sh;
    });
    y+=h+nP;
  });
}

// Links
const LC={};
R.forEach(r=>{for(let i=0;i<N-1;i++){const a=r[i+2],b=r[i+3];if(!a||!b)continue;const k=`${i}|${a}→${i+1}|${b}`;LC[k]=(LC[k]||0)+r[1];}});
const sOut={},tIn={};
Object.keys(NP).forEach(k=>{sOut[k]=0;tIn[k]=0;});
const LL=Object.entries(LC).map(([k,v])=>{const[sk,tk]=k.split('→');return{sk,tk,v,from:sk.split('|')[1],to:tk.split('|')[1]};})
.sort((a,b)=>{if(a.from===a.to&&b.from!==b.to)return-1;if(a.from!==a.to&&b.from===b.to)return 1;return sO.indexOf(a.to)-sO.indexOf(b.to);});
LL.forEach(l=>{const s=NP[l.sk],t=NP[l.tk];if(!s||!t){l.skip=1;return;}
const ss=(s.y1-s.y0)/s.cnt,ts=(t.y1-t.y0)/t.cnt;
l.th=Math.max(1,Math.min(l.v*ss,l.v*ts));l.sy=s.y0+sOut[l.sk];l.ty=t.y0+tIn[l.tk];sOut[l.sk]+=l.th;tIn[l.tk]+=l.th;});

const svg=d3.select('#chart').append('svg')
  .attr('viewBox',`0 0 ${W} ${H}`).attr('width','100%')
  .attr('font-family','-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif');

// Ribbons
const fG=svg.append('g');
LL.forEach((l,li)=>{if(l.skip)return;
  const s=NP[l.sk],t=NP[l.tk],sx=s.x1,tx=t.x0;
  const sy0=l.sy,sy1=l.sy+l.th,ty0=l.ty,ty1=l.ty+l.th,mx=(sx+tx)/2;
  fG.append('path')
    .attr('d',`M${sx},${sy0} C${mx},${sy0} ${mx},${ty0} ${tx},${ty0} L${tx},${ty1} C${mx},${ty1} ${mx},${sy1} ${sx},${sy1} Z`)
    .attr('fill',C[l.to]).attr('fill-opacity',dk?.18:.14)
    .attr('stroke',C[l.to]).attr('stroke-width',.4).attr('stroke-opacity',dk?.12:.08)
    .attr('class','fl').attr('data-i',li).style('cursor','pointer')
    .on('mouseenter',function(ev){
      fG.selectAll('.fl').attr('fill-opacity',function(){return+this.dataset.i===li?(dk?.5:.4):(dk?.03:.02);})
        .attr('stroke-opacity',function(){return+this.dataset.i===li?.35:.01;});
      tp.style.display='block';
      tp.innerHTML=`<b>${l.from}</b> → <b>${l.to}</b><br>${steps[NP[l.sk].si]} → ${steps[NP[l.tk].si]}<br>${l.v} app${l.v>1?'s':''}`;
    })
    .on('mousemove',ev=>{tp.style.left=(ev.clientX+12)+'px';tp.style.top=(ev.clientY-8)+'px';})
    .on('mouseleave',()=>{fG.selectAll('.fl').attr('fill-opacity',dk?.18:.14).attr('stroke-opacity',dk?.12:.08);tp.style.display='none';});
});

// Bars
Object.values(NP).forEach(n=>{
  svg.append('rect').attr('x',n.x0).attr('y',n.y0).attr('width',bW)
    .attr('height',Math.max(2,n.y1-n.y0)).attr('rx',3).attr('fill',C[n.st]);
});

// Status labels (right of bar, for each node)
Object.values(NP).forEach(n=>{
  const h=n.y1-n.y0;
  if(h<12)return;
  svg.append('text').attr('x',n.x1+8).attr('y',n.y0+2).attr('dy','.8em')
    .attr('font-size','13px').attr('font-weight',500)
    .attr('fill',dk?'#D3D1C7':'#444').text(n.st);
  if(h>=26){
    const pct=Math.round(n.cnt/cT[n.si]*100);
    svg.append('text').attr('x',n.x1+8).attr('y',n.y0+17).attr('dy','.8em')
      .attr('font-size','11px').attr('fill',dk?'#777':'#aaa').text(`${n.cnt} · ${pct}%`);
  }
});

// Company labels — on EVERY column, left side, with overlap detection per column
const uY={};
const cG2=svg.append('g');
segs.forEach(seg=>{
  const h=seg.y1-seg.y0;
  if(h<6)return;
  const midY=(seg.y0+seg.y1)/2;
  const fs=h>16?12:h>10?10:8;
  const lh=fs+2;
  const ly0=midY-lh/2, ly1=midY+lh/2;
  const col=seg.si+'|'+seg.st;
  if(!uY[col])uY[col]=[];
  if(uY[col].some(a=>!(ly1<a[0]||ly0>a[1])))return;
  uY[col].push([ly0,ly1]);
  const lab=seg.w>1?`${seg.lab} ×${seg.w}`:seg.lab;
  cG2.append('text')
    .attr('x',seg.x0-6).attr('y',midY).attr('dy','0.35em').attr('text-anchor','end')
    .attr('font-size',fs+'px').attr('fill',dk?'#999':'#888').text(lab);
});

// Date headers
steps.forEach((l,i)=>{
  const x=mg.l+i*(bW+cG)+bW/2;
  svg.append('text').attr('x',x).attr('y',mg.t-14).attr('text-anchor','middle')
    .attr('font-size','14px').attr('font-weight',500).attr('fill',dk?'#B4B2A9':'#555').text(l);
  svg.append('text').attr('x',x).attr('y',mg.t-1).attr('text-anchor','middle')
    .attr('font-size','10px').attr('fill',dk?'#666':'#bbb').text(cT[i]);
});

// Title
svg.append('text').attr('x',W/2).attr('y',16).attr('text-anchor','middle')
  .attr('font-size','16px').attr('font-weight',500).attr('fill',dk?'#D3D1C7':'#333')
  .text('Internship application journey · 54 total');
</script>
</body>
</html>
