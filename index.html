
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Journey Sankey</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fff; color: #333;
  display: flex; justify-content: center;
  padding: 1rem 0; overflow-x: auto;
}
@media (prefers-color-scheme: dark) {
  body { background: #1a1a1a; color: #D3D1C7; }
}
#chart { width: 100%; max-width: 1100px; min-width: 800px; }
.tp {
  position: fixed; pointer-events: none; z-index: 10;
  padding: 7px 11px; border-radius: 7px;
  font-size: 11px; line-height: 1.5; max-width: 280px; display: none;
  background: rgba(0,0,0,0.82); color: #fff;
}
@media (prefers-color-scheme: dark) {
  .tp { background: rgba(255,255,255,0.92); color: #1a1a1a; }
}
</style>
</head>
<body>
<div id="chart"></div>
<div class="tp" id="tp"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const tp = document.getElementById('tp');

const C = {
  'New':       isDark ? '#2CB88A' : '#5DCAA5',
  'Applied':   isDark ? '#4A9AD9' : '#7DBCE8',
  'OA':        isDark ? '#D9A030' : '#F2C96B',
  'Interview': isDark ? '#8B7BD4' : '#B0A6E8',
  'Rejected':  isDark ? '#D06060' : '#EE9090',
};

const steps = ['4/2','4/3','4/4–5','4/7–8','4/10–12'];
const sOrd = ['New','Applied','OA','Interview','Rejected'];

// [label, weight, s0, s1, s2, s3, s4]
const R = [
  ['Tesla',1,         'New','Applied','Applied','Applied','Applied'],
  ['IBM',3,           'New','Rejected',null,null,null],
  ['字节',1,          'New','Applied','Applied','Applied','Interview'],
  ['Bytedance',1,     'New','Applied','Applied','Applied','Applied'],
  ['Stealth',1,       'New','Applied','Applied','Applied','Applied'],
  ['百度',2,          null,'New','Applied','Applied','Applied'],
  ['小米',3,          null,'New','Applied','Applied','Applied'],
  ['美团',4,          null,'New','Applied','Applied','Applied'],
  ['华为',2,          null,'New','Applied','Applied','Applied'],
  ['腾讯',1,          null,'New','Applied','Applied','Interview'],
  ['阿里',1,          null,'New','Applied','OA','OA'],
  ['阿里',2,          null,'New','Rejected',null,null],
  ['阿里',1,          null,'New','Applied','Rejected',null],
  ['阿里',2,          null,'New','Applied','Applied','Applied'],
  ['中金',1,          null,'New','Applied','Applied','Applied'],
  ['Amazon',1,        null,'New','Applied','Applied','OA'],
  ['OpenAI',1,        null,null,'New','Applied','Applied'],
  ['OpenAI',1,        null,null,'New','Rejected',null],
  ['阿里',3,          null,null,'New','Rejected',null],
  ['Lenovo',1,        null,null,null,'New','Applied'],
  ['Snyk',1,          null,null,null,'New','Applied'],
  ['Cadence',1,       null,null,null,'New','Applied'],
  ['Tinder',1,        null,null,null,'New','Applied'],
  ['Netflix',1,       null,null,null,'New','Applied'],
  ['Amazon',1,        null,null,null,'New','Applied'],
  ['Apple',2,         null,null,null,'New','Applied'],
  ['DoorDash',1,      null,null,null,'New','Applied'],
  ['华为',1,          null,null,null,'New','Applied'],
  ['阿里',1,          null,null,null,'New','Applied'],
  ['阿里',3,          null,null,null,'New','OA'],
  ['Rednote',4,       null,null,null,null,'New'],
  ['Volvox',2,        null,null,null,null,'New'],
  ['中信建设',1,      null,null,null,null,'New'],
  ['百度',1,          null,null,null,null,'Interview'],
  ['OCBridge',1,      null,null,null,null,'Rejected'],
];

const N = 5, barW = 8;
const colTot = [];
for (let i = 0; i < N; i++) colTot.push(R.reduce((s, r) => r[i+2] ? s + r[1] : s, 0));
const maxTot = Math.max(...colTot);

const W = 1100, H = 580;
const m = { t: 46, b: 16, l: 20, r: 20 };
const aH = H - m.t - m.b;
const colGap = (W - m.l - m.r - barW * N) / (N - 1);
const uH = aH / maxTot;
const nPad = 4;

// Build nodes
const NP = {}; // nodePos
const segs = []; // segments for labels

for (let si = 0; si < N; si++) {
  const x0 = m.l + si * (barW + colGap);
  const cH = colTot[si] * uH;
  const startY = m.t + (aH - cH) / 2;
  const groups = [];
  sOrd.forEach(st => {
    const matching = R.filter(r => r[si+2] === st);
    if (!matching.length) return;
    const cnt = matching.reduce((s, r) => s + r[1], 0);
    groups.push({ st, cnt, rows: matching });
  });
  const tPad = (groups.length - 1) * nPad;
  const sc = (cH - tPad) / colTot[si];
  let y = startY;
  groups.forEach(g => {
    const h = g.cnt * sc;
    NP[`${si}|${g.st}`] = { x0, x1: x0+barW, y0: y, y1: y+h, si, st: g.st, cnt: g.cnt };
    let sy = y;
    g.rows.forEach(r => {
      const sh = r[1] * sc;
      segs.push({ si, st: g.st, lab: r[0], w: r[1], y0: sy, y1: sy+sh, x0, x1: x0+barW });
      sy += sh;
    });
    y += h + nPad;
  });
}

// Links
const LC = {};
R.forEach(r => {
  for (let i = 0; i < N-1; i++) {
    const a = r[i+2], b = r[i+3];
    if (!a || !b) continue;
    const k = `${i}|${a}→${i+1}|${b}`;
    LC[k] = (LC[k]||0) + r[1];
  }
});
const sO = {}, tI = {};
Object.keys(NP).forEach(k => { sO[k]=0; tI[k]=0; });
const LL = Object.entries(LC).map(([k,v]) => {
  const [sk,tk] = k.split('→');
  return { sk, tk, v, from: sk.split('|')[1], to: tk.split('|')[1] };
}).sort((a,b) => {
  if (a.from===a.to && b.from!==b.to) return -1;
  if (a.from!==a.to && b.from===b.to) return 1;
  return sOrd.indexOf(a.to) - sOrd.indexOf(b.to);
});
LL.forEach(l => {
  const s = NP[l.sk], t = NP[l.tk];
  if (!s||!t) { l.skip=1; return; }
  const ss = (s.y1-s.y0)/s.cnt, ts = (t.y1-t.y0)/t.cnt;
  l.th = Math.max(1, Math.min(l.v*ss, l.v*ts));
  l.sy = s.y0 + sO[l.sk]; l.ty = t.y0 + tI[l.tk];
  sO[l.sk] += l.th; tI[l.tk] += l.th;
});

// SVG
const svg = d3.select('#chart').append('svg')
  .attr('viewBox', `0 0 ${W} ${H}`).attr('width','100%')
  .attr('font-family','-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif');

// Ribbons
const fG = svg.append('g');
LL.forEach((l,li) => {
  if (l.skip) return;
  const sx = NP[l.sk].x1, tx = NP[l.tk].x0;
  const sy0=l.sy, sy1=l.sy+l.th, ty0=l.ty, ty1=l.ty+l.th;
  const mx = (sx+tx)/2;
  fG.append('path')
    .attr('d',`M${sx},${sy0} C${mx},${sy0} ${mx},${ty0} ${tx},${ty0} L${tx},${ty1} C${mx},${ty1} ${mx},${sy1} ${sx},${sy1} Z`)
    .attr('fill',C[l.to]).attr('fill-opacity',isDark?.18:.14)
    .attr('stroke',C[l.to]).attr('stroke-width',.3).attr('stroke-opacity',isDark?.1:.07)
    .attr('class','fl').attr('data-i',li).style('cursor','pointer')
    .on('mouseenter',function(ev){
      fG.selectAll('.fl').attr('fill-opacity',function(){return +this.dataset.i===li?(isDark?.5:.4):(isDark?.03:.02)})
        .attr('stroke-opacity',function(){return +this.dataset.i===li?.3:.01});
      tp.style.display='block';
      tp.innerHTML=`<b>${l.from}</b> → <b>${l.to}</b><br>${steps[NP[l.sk].si]} → ${steps[NP[l.tk].si]}<br>${l.v} app${l.v>1?'s':''}`;
    })
    .on('mousemove',ev=>{tp.style.left=(ev.clientX+12)+'px';tp.style.top=(ev.clientY-8)+'px'})
    .on('mouseleave',()=>{
      fG.selectAll('.fl').attr('fill-opacity',isDark?.18:.14).attr('stroke-opacity',isDark?.1:.07);
      tp.style.display='none';
    });
});

// Bars
Object.entries(NP).forEach(([k,n]) => {
  svg.append('rect').attr('x',n.x0).attr('y',n.y0).attr('width',barW)
    .attr('height',Math.max(2,n.y1-n.y0)).attr('rx',3).attr('fill',C[n.st]);
});

// Status labels — only beside nodes tall enough, on the right
Object.entries(NP).forEach(([k,n]) => {
  const h = n.y1 - n.y0;
  if (h < 14) return;
  svg.append('text').attr('x',n.x1+5).attr('y',n.y0+1).attr('dy','.85em')
    .attr('font-size','10px').attr('font-weight',500)
    .attr('fill',isDark?'#D3D1C7':'#555').text(n.st);
  if (h >= 28) {
    const pct = Math.round(n.cnt / colTot[n.si] * 100);
    svg.append('text').attr('x',n.x1+5).attr('y',n.y0+13).attr('dy','.85em')
      .attr('font-size','9px').attr('fill',isDark?'#777':'#aaa').text(`${n.cnt} · ${pct}%`);
  }
});

// Company labels — only in the NEW column where each row first appears
// Use small font, left of bar, avoid overlap by tracking y positions
const labelAreas = []; // [{y0, y1}] to detect overlap
const compG = svg.append('g');

segs.forEach(seg => {
  // Only label in the step where status = 'New' (first appearance)
  if (seg.st !== 'New') return;
  const h = seg.y1 - seg.y0;
  if (h < 5) return;

  const midY = (seg.y0 + seg.y1) / 2;
  const fontSize = h > 12 ? 9 : 7;
  const labelH = fontSize + 2;

  // Check overlap with existing labels
  const ly0 = midY - labelH/2;
  const ly1 = midY + labelH/2;
  const overlaps = labelAreas.some(a => a.si === seg.si && !(ly1 < a.y0 || ly0 > a.y1));
  if (overlaps) return;

  labelAreas.push({ y0: ly0, y1: ly1, si: seg.si });

  const dispLabel = seg.w > 1 ? `${seg.lab} ×${seg.w}` : seg.lab;
  compG.append('text')
    .attr('x', seg.x0 - 4).attr('y', midY)
    .attr('dy', '0.35em').attr('text-anchor', 'end')
    .attr('font-size', fontSize + 'px')
    .attr('fill', isDark ? '#888' : '#999')
    .text(dispLabel);
});

// Column headers
steps.forEach((l,i) => {
  const x = m.l + i*(barW+colGap) + barW/2;
  svg.append('text').attr('x',x).attr('y',m.t-12).attr('text-anchor','middle')
    .attr('font-size','11px').attr('font-weight',500)
    .attr('fill',isDark?'#B4B2A9':'#666').text(l);
  svg.append('text').attr('x',x).attr('y',m.t-1).attr('text-anchor','middle')
    .attr('font-size','8px').attr('fill',isDark?'#666':'#ccc').text(colTot[i]);
});

// Title
svg.append('text').attr('x',W/2).attr('y',14).attr('text-anchor','middle')
  .attr('font-size','13px').attr('font-weight',500)
  .attr('fill',isDark?'#D3D1C7':'#333').text('Internship application journey · 54 total');
</script>
</body>
</html>
